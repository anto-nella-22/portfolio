<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Portfolio website showcasing software development work, technical skills, and featured projects.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}software developer, full-stack developer, Django developer, Python developer, web developer, portfolio{% endblock %}">
    <meta name="author" content="{% block meta_author %}Antonella Lopez{% endblock %}">
    <meta name="robots" content="{% block meta_robots %}index, follow{% endblock %}">
    <link rel="canonical" href="{% block canonical_url %}{{ request.build_absolute_uri }}{% endblock %}">

    <meta property="og:site_name" content="{% block og_site_name %}Antonella Lopez Portfolio{% endblock %}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Portfolio{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Portfolio website showcasing software development work, technical skills, and featured projects.{% endblock %}">
    <meta property="og:url" content="{% block og_url %}{{ request.build_absolute_uri }}{% endblock %}">

    <meta name="twitter:card" content="{% block twitter_card %}summary_large_image{% endblock %}">
    <meta name="twitter:title" content="{% block twitter_title %}Portfolio{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Portfolio website showcasing software development work, technical skills, and featured projects.{% endblock %}">
    {% load static %}
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body class="loading dark-theme">
    <svg width="0" height="0" class="visually-hidden" aria-hidden="true" focusable="false">
        <symbol id="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></circle>
            <path d="M12 2.5v2.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M12 19.2v2.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M4.9 4.9l1.6 1.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M17.5 17.5l1.6 1.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M2.5 12h2.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M19.2 12h2.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M4.9 19.1l1.6-1.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M17.5 6.5l1.6-1.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
        </symbol>
        <symbol id="icon-moon" viewBox="0 0 24 24">
            <path d="M19 14.8A7.8 7.8 0 1 1 9.2 5a6.4 6.4 0 0 0 9.8 9.8Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
        </symbol>
        <symbol id="icon-bolt" viewBox="0 0 24 24">
            <path d="M13.4 2 5.9 13h4.9L9.9 22 18.1 10.8h-4.8L13.4 2Z" fill="currentColor"></path>
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24">
            <path d="m5.5 12.5 4.2 4.2L18.5 8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </symbol>
        <symbol id="icon-error" viewBox="0 0 24 24">
            <path d="M15.8 8.2 8.2 15.8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="m8.2 8.2 7.6 7.6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </symbol>
        <symbol id="icon-info" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></circle>
            <path d="M12 10.5v5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M12 7.5h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </symbol>
        <symbol id="icon-warning" viewBox="0 0 24 24">
            <path d="M12 3.8 21 19.2H3L12 3.8Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M12 9v4.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M12 17h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </symbol>
        <symbol id="icon-close" viewBox="0 0 24 24">
            <path d="M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="m6 6 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </symbol>
    </svg>
    {% block content %}{% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'core/js/main.js' %}"></script>

    <!-- Django messages toast -->
    <script>
        window.addEventListener('load', function() {
            const djangoMessages = [];
            {% for message in messages %}
                djangoMessages.push({
                    message: "{{ message|escapejs }}",
                    tags: "{{ message.tags }}"
                });
            {% endfor %}

            if (!djangoMessages.length) {
                return;
            }

            if (typeof showToast !== 'function') {
                console.error('showToast function not found. Is main.js loaded?');
                return;
            }

            djangoMessages.forEach(function(msg) {
                showToast(msg.message, msg.tags || 'success');
            });
        });
    </script>
</body>
</html>
